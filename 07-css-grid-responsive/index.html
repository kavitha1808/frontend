<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Product Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Our Products</h1>
    <p>Responsive Product Grid using CSS Grid</p>
  </header>

  <section class="products">
    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 1">
      <h3>Wireless Headphones</h3>
      <p class="price">₹1,999</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 2">
      <h3>Smart Watch</h3>
      <p class="price">₹2,499</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 3">
      <h3>Bluetooth Speaker</h3>
      <p class="price">₹1,299</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 4">
      <h3>Gaming Mouse</h3>
      <p class="price">₹899</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 5">
      <h3>Keyboard</h3>
      <p class="price">₹1,499</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250x180" alt="Product 6">
      <h3>USB Hub</h3>
      <p class="price">₹699</p>
      <button>Buy Now</button>
    </div>
  </section>

</body>
  </html>
